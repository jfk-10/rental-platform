<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Rental Platform</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="/assets/icons/site.webmanifest">
  <link rel="icon" href="/assets/icons/favicon.ico?v=1">
  <link rel="preload" href="/assets/css/style.css" as="style">
  <link rel="preload" href="/assets/js/main.js" as="script">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="app-body">
  <div class="utility-bar">
  </div>
  <main class="dashboard-layout dashboard-layout--full">
    <section class="dashboard-shell">
      <section class="page-card">
        <h1 class="section-title">Admin Dashboard</h1>
        <p class="section-subtitle">Monitor platform health, user growth, and property operations.</p>
        <div class="kpi-grid">
          <article class="kpi-card metric-card"><div class="kpi-head"><span class="kpi-icon">👤</span><p class="kpi-label">Total Users</p></div><p class="kpi-value" id="userCount">0</p></article>
          <article class="kpi-card metric-card"><div class="kpi-head"><span class="kpi-icon">🏢</span><p class="kpi-label">Total Properties</p></div><p class="kpi-value" id="propertyCount">0</p></article>
          <article class="kpi-card metric-card"><div class="kpi-head"><span class="kpi-icon">🟢</span><p class="kpi-label">Available Listings</p></div><p class="kpi-value" id="availableCount">0</p></article>
          <article class="kpi-card metric-card"><div class="kpi-head"><span class="kpi-icon">🔒</span><p class="kpi-label">Rented Listings</p></div><p class="kpi-value" id="rentedCount">0</p></article>
        </div>
      </section>

      <section class="page-card data-table-card">
        <h3 class="section-title">User Management</h3>
        <div class="table-wrap"><table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th></tr></thead><tbody id="userTableBody"></tbody></table></div>
      </section>

      <section class="page-card data-table-card">
        <h3 class="section-title">Property Overview</h3>
        <div class="table-wrap"><table><thead><tr><th>ID</th><th>Title</th><th>City</th><th>Status</th><th>Rent</th></tr></thead><tbody id="propertyOverviewBody"></tbody></table></div>
      </section>
    </section>
  </main>
  <script type="module" src="../js/core/toast.js"></script>
<script type="module" src="../js/modules/admin.js"></script>
<script type="module" src="../js/modules/appShell.js"></script>
  <script src="/assets/js/main.js" defer></script>
</body>
</html>
