<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Rental Platform</title>
  <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body class="app-body">
  <div class="utility-bar" id="dashboardNavbar"></div>


  <main class="dashboard-layout dashboard-layout--full">
    <section class="dashboard-shell">
      <section class="page-card">
        <h1 class="section-title">Admin Dashboard</h1>
        <div class="kpi-grid">
          <article class="kpi-card metric-card"><p class="kpi-label">Total Users</p><p class="kpi-value" id="adminTotalUsers">0</p></article>
          <article class="kpi-card metric-card"><p class="kpi-label">Total Properties</p><p class="kpi-value" id="adminTotalProperties">0</p></article>
          <article class="kpi-card metric-card"><p class="kpi-label">Active Agreements</p><p class="kpi-value" id="adminActiveAgreements">0</p></article>
          <article class="kpi-card metric-card"><p class="kpi-label">Pending Maintenance Requests</p><p class="kpi-value" id="adminPendingMaintenance">0</p></article>
          <article class="kpi-card metric-card"><p class="kpi-label">Platform Statistics</p><p class="kpi-value" id="adminPlatformStats">0%</p></article>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="../js/authGuard.js"></script>
  <script type="module" src="../js/modules/admin.js"></script>
  <script type="module" src="../components/navbar.js"></script>
</body>
</html>
