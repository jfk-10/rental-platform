<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tenant Dashboard | Rental Platform</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body class="app-body">
  <div class="utility-bar">
    <div class="app-nav shell-panel navbar-container">
      <a class="app-brand" href="../index.html">🏠 Rental Platform</a>
      <nav class="app-links">
        <a href="../dashboards/tenant.html">Dashboard</a>
        <a href="../pages/property-list.html">My Rentals</a>
        <a href="../pages/payments.html">Payments</a>
        <a href="../pages/maintenance.html">Maintenance</a>
        <a href="../pages/profile.html">Profile</a>
      </nav>
    </div>
  </div>

  <main class="dashboard-layout dashboard-layout--full">
    <section class="dashboard-shell">
      <section id="tenantProfilePrompt" class="page-card" hidden>
        <h3 class="section-title">Complete your profile to unlock all features.</h3>
        <a class="btn btn-primary" href="../pages/profile.html">Complete Profile</a>
      </section>

      <section class="page-card">
        <h1 class="section-title">Tenant Dashboard</h1>
        <div class="kpi-grid">
          <article class="kpi-card metric-card"><p class="kpi-label">Active Rental</p><p class="kpi-value" id="tenantActiveRental">0</p></article>
          <article class="kpi-card metric-card"><p class="kpi-label">Upcoming Payment</p><p class="kpi-value" id="tenantUpcomingPayment">₹0</p></article>
          <article class="kpi-card metric-card"><p class="kpi-label">Maintenance Requests</p><p class="kpi-value" id="tenantMaintenanceRequests">0</p></article>
          <article class="kpi-card metric-card"><p class="kpi-label">Rental Agreement Status</p><p class="kpi-value" id="tenantAgreementStatus">No Active Agreement</p></article>
          <article class="kpi-card metric-card"><p class="kpi-label">Recent Notifications</p><p class="kpi-value" id="tenantRecentNotifications">0</p></article>
        </div>
      </section>
    </section>
  </main>
  <script type="module" src="../js/authGuard.js"></script>
  <script type="module" src="../js/modules/tenant.js"></script>
</body>
</html>
