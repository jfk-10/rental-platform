<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Dashboard | Rental Platform</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body class="app-body">
  <div class="utility-bar">
    <div class="app-nav shell-panel navbar-container">
      <a class="app-brand" href="../index.html">🏠 Rental Platform</a>
      <nav class="app-links">
        <a href="../dashboards/owner.html">Dashboard</a>
        <a href="../pages/property-list.html">Properties</a>
        <a href="../pages/agreements.html">Agreements</a>
        <a href="../pages/payments.html">Payments</a>
        <a href="../pages/maintenance.html">Maintenance</a>
        <a href="../pages/profile.html">Profile</a>
      </nav>
    </div>
  </div>

  <main class="dashboard-layout dashboard-layout--full">
    <section class="dashboard-shell">
      <section id="ownerProfilePrompt" class="page-card" hidden>
        <h3 class="section-title">Complete your profile to unlock all features.</h3>
        <a class="btn btn-primary" href="../pages/profile.html">Complete Profile</a>
      </section>

      <section class="page-card">
        <h1 class="section-title">Owner Dashboard</h1>
        <div class="kpi-grid">
          <article class="kpi-card metric-card"><p class="kpi-label">Total Properties</p><p class="kpi-value" id="ownerTotalProperties">0</p></article>
          <article class="kpi-card metric-card"><p class="kpi-label">Active Agreements</p><p class="kpi-value" id="ownerActiveAgreements">0</p></article>
          <article class="kpi-card metric-card"><p class="kpi-label">Monthly Rental Income</p><p class="kpi-value" id="ownerMonthlyIncome">₹0</p></article>
          <article class="kpi-card metric-card"><p class="kpi-label">Maintenance Requests</p><p class="kpi-value" id="ownerMaintenanceRequests">0</p></article>
          <article class="kpi-card metric-card"><p class="kpi-label">Recent Tenant Activity</p><p class="kpi-value" id="ownerRecentActivity">0</p></article>
        </div>
      </section>
    </section>
  </main>
  <script type="module" src="../js/authGuard.js"></script>
  <script type="module" src="../js/modules/owner.js"></script>
</body>
</html>
