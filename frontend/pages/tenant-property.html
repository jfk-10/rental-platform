<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Details | NestFinder</title>
  <meta name="description" content="View property details including photos, rent, specs, and owner contact." />
  <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <style id="mobile-responsive">
    /* ── Universal mobile responsiveness ── */

    /* Tables: always scrollable, never squished */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      background:
        linear-gradient(to right, var(--surface) 30%, transparent),
        linear-gradient(to left,  var(--surface) 30%, transparent) 100% 0,
        radial-gradient(farthest-side at 0 50%, rgba(15,23,42,0.07), transparent),
        radial-gradient(farthest-side at 100% 50%, rgba(15,23,42,0.07), transparent) 100% 0;
      background-repeat: no-repeat;
      background-size: 40px 100%, 40px 100%, 12px 100%, 12px 100%;
      background-attachment: local, local, scroll, scroll;
    }
    .table-wrap table { min-width: 600px; }

    @media (max-width: 600px) {
      .page-shell  { margin-top: 0.75rem; margin-bottom: 1.5rem; }
      .page-card   { padding: 1rem; }
      .form-grid   { grid-template-columns: 1fr !important; }
      .form-grid .full { grid-column: 1; }
      .kpi-grid    { grid-template-columns: repeat(2, 1fr) !important; }
      .dash-main   { padding: 0.85rem !important; }
      .dash-section-head { padding: 0.85rem 1rem !important; }
      .properties-grid,
      .property-grid { grid-template-columns: 1fr !important; }
      .profile-form-grid { grid-template-columns: 1fr !important; }
      .dash-option-grid  { grid-template-columns: 1fr !important; }
      .actions-row { flex-direction: column; }
      .actions-row .btn { width: 100%; justify-content: center; }
      .table-wrap th,
      .table-wrap td { padding: 0.55rem 0.75rem; font-size: 0.82rem; }
      .preview-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      .preview-item img { width: 100%; height: 80px; }
    }
  </style>
</head>
<body class="app-body">
  <div class="utility-bar" id="dashboardNavbar" hidden></div>

  <!-- Public-friendly nav -->
  <header class="utility-bar" id="publicPropertyHeader">
    <nav class="app-nav">
      <a class="app-brand" href="../index.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        NestFinder
      </a>
      <div class="app-links">
        <a href="../index.html">Home</a>
        <a href="../pages/discover.html">Discover</a>
      </div>
      <div class="app-user-actions" id="detailsNavActions">
        <a id="loginBtn" class="btn btn-secondary btn-sm" href="../pages/login.html">Login</a>
        <a id="signupBtn" class="btn btn-primary btn-sm" href="../pages/register.html">Sign up</a>
      </div>
    </nav>
  </header>

  <main class="page-shell content-stack">
    <section id="propertyDetails" class="page-card">
      <p class="section-subtitle">Loading property…</p>
    </section>
  </main>

  <script type="module" src="../js/authGuard.js"></script>
  <script type="module" src="../js/core/toast.js"></script>
  <script type="module" src="../js/modules/tenantProperty.js"></script>
  <script type="module" src="../components/navbar.js"></script>
</body>
</html>
