<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Rentals | NestFinder</title>
  <meta name="description" content="Tenant workspace for browsing available rental listings." />
  <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <style id="mobile-responsive">
    /* ── Universal mobile responsiveness ── */

    /* Tables: always scrollable, never squished */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      background:
        linear-gradient(to right, var(--surface) 30%, transparent),
        linear-gradient(to left,  var(--surface) 30%, transparent) 100% 0,
        radial-gradient(farthest-side at 0 50%, rgba(15,23,42,0.07), transparent),
        radial-gradient(farthest-side at 100% 50%, rgba(15,23,42,0.07), transparent) 100% 0;
      background-repeat: no-repeat;
      background-size: 40px 100%, 40px 100%, 12px 100%, 12px 100%;
      background-attachment: local, local, scroll, scroll;
    }
    .table-wrap table { min-width: 600px; }

    @media (max-width: 600px) {
      .page-shell  { margin-top: 0.75rem; margin-bottom: 1.5rem; }
      .page-card   { padding: 1rem; }
      .form-grid   { grid-template-columns: 1fr !important; }
      .form-grid .full { grid-column: 1; }
      .kpi-grid    { grid-template-columns: repeat(2, 1fr) !important; }
      .dash-main   { padding: 0.85rem !important; }
      .dash-section-head { padding: 0.85rem 1rem !important; }
      .properties-grid,
      .property-grid { grid-template-columns: 1fr !important; }
      .profile-form-grid { grid-template-columns: 1fr !important; }
      .dash-option-grid  { grid-template-columns: 1fr !important; }
      .actions-row { flex-direction: column; }
      .actions-row .btn { width: 100%; justify-content: center; }
      .table-wrap th,
      .table-wrap td { padding: 0.55rem 0.75rem; font-size: 0.82rem; }
      .preview-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      .preview-item img { width: 100%; height: 80px; }
    }
  </style>
</head>
<body class="app-body">
  <div class="utility-bar" id="dashboardNavbar"></div>

  <main class="page-shell content-stack">

    <!-- Page Header -->
    <section class="page-card" style="background:linear-gradient(135deg,#16a34a 0%,#0f766e 100%);border:none;padding:2rem 2.5rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap">
        <div>
          <p style="font-size:0.72rem;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:0.4rem">Tenant Workspace</p>
          <h1 style="font-size:clamp(1.4rem,2.5vw,1.9rem);color:#fff;margin:0 0 0.3rem;line-height:1.2">Browse Rentals</h1>
          <p style="color:rgba(255,255,255,0.75);font-size:0.9rem;margin:0">Review available rentals and send interest requests directly to owners.</p>
        </div>
        <div style="display:flex;align-items:center;gap:0.6rem;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius-md);padding:0.75rem 1.1rem">
          <span style="font-size:1.4rem">🔎</span>
          <span style="font-size:0.8rem;font-weight:600;color:rgba(255,255,255,0.9)">Available Listings</span>
        </div>
      </div>
    </section>

    <!-- Listings -->
    <section class="page-card">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.1rem;flex-wrap:wrap">
        <div>
          <h2 class="section-title" style="margin-bottom:0.2rem">Available Listings</h2>
          <p class="section-subtitle" id="browseSummary" style="margin-bottom:0">Loading current rentals…</p>
        </div>
      </div>
      <div id="browseRentalsGrid" class="property-grid"></div>
    </section>

  </main>

  <!-- Property Details Modal -->
  <section id="tenantPropertyDetailsModal" class="workspace-modal" hidden>
    <div class="workspace-modal__backdrop" data-close-tenant-modal="true"></div>
    <div class="workspace-modal__panel page-card">
      <div class="workspace-modal__head">
        <div>
          <h3 class="section-title">Property Details</h3>
          <p class="section-subtitle">Review the listing without leaving your tenant workspace.</p>
        </div>
        <button class="btn btn-ghost" type="button" id="closeTenantPropertyModal">✕ Close</button>
      </div>
      <div id="tenantPropertyDetailsBody" class="content-stack"></div>
    </div>
  </section>

  <script type="module" src="../js/authGuard.js"></script>
  <script type="module" src="../js/modules/browseRentals.js"></script>
  <script type="module" src="../components/navbar.js"></script>
</body>
</html>
