<!DOCTYPE html>
<html lang="en">
<head>
  <title>Discover Rentals | Rental Platform</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="app-body">
  <div class="utility-bar"></div>

  <main class="page-shell content-stack">
    <section class="page-card">
      <h1 class="section-title">Discover properties</h1>
      <p class="section-subtitle">Search by city, status, and budget to see active listings.</p>
      <div class="search-bar shell-panel discover-filter-card">
        <div class="discover-filter-head">
          <h3>Filter listings</h3>
          <p>Narrow your search to find homes that match your needs.</p>
        </div>
        <div class="discover-filter-grid">
          <div>
            <label for="homeCity">City</label>
            <input id="homeCity" type="text" placeholder="e.g. Nairobi" />
          </div>
          <div>
            <label for="homeStatus">Status</label>
            <select id="homeStatus"><option value="">Any status</option><option value="Available">Available</option><option value="Rented">Rented</option></select>
          </div>
          <div>
            <label for="homeBudget">Budget (Max)</label>
            <input id="homeBudget" type="number" placeholder="e.g. 1200" />
          </div>
          <div class="toolbar-action-wrap">
            <button id="homeSearch" class="btn btn-primary" type="button">Search listings</button>
          </div>
        </div>
      </div>
    </section>

    <section class="page-card">
      <h2 class="section-title">Recommended properties</h2>
      <div id="recommendedGrid" class="property-grid"></div>
    </section>

    <section class="page-card">
      <h2 class="section-title">Newly added homes</h2>
      <div id="newHomesGrid" class="property-grid"></div>
    </section>
  </main>

  <script type="module" src="../js/modules/appShell.js"></script>
  <script type="module" src="../js/modules/home.js"></script>
</body>
</html>
