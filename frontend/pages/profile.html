<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Rental Platform</title>
  <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
</head>
<body class="app-body">
  <div class="utility-bar" id="dashboardNavbar"></div>

  <main class="page-shell">
    <section class="page-card profile-page-card">
      <div class="profile-page-head">
        <h1 class="section-title">Your Profile</h1>
        <div class="actions-row profile-actions">
          <button id="editProfileBtn" class="btn btn-primary" type="button">Edit Profile</button>
          <button id="saveProfileBtn" class="btn btn-primary" type="submit" form="profileForm" hidden>Save Changes</button>
          <button id="cancelProfileBtn" class="btn btn-secondary" type="button" hidden>Cancel</button>
          <button id="logoutBtn" class="btn btn-danger" type="button">Logout</button>
        </div>
      </div>

      <form id="profileForm" class="form-grid profile-grid">
        <div class="profile-item"><label>Name</label><p id="profileNameView" class="profile-value"></p><input id="profileName" type="text" readonly hidden /></div>
        <div class="profile-item"><label>Email</label><p id="profileEmailView" class="profile-value"></p><input id="profileEmail" type="email" readonly hidden /></div>
        <div class="profile-item"><label>Role</label><p id="profileRoleView" class="profile-value"></p><input id="profileRole" type="text" readonly hidden /></div>
        <div class="profile-item"><label>Phone</label><p id="profilePhoneView" class="profile-value"></p><input id="profilePhone" type="text" required readonly hidden /></div>
        <div class="profile-item"><label>City</label><p id="profileCityView" class="profile-value"></p><input id="profileCity" type="text" required readonly hidden /></div>
      </form>
    </section>
  </main>


  <script type="module" src="../js/authGuard.js"></script>
  <script type="module" src="../js/profile.js"></script>
  <script type="module" src="../components/navbar.js"></script>
</body>
</html>
