<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Rental Platform</title>
  <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
</head>
<body class="app-body">
  <div class="utility-bar">
    <div class="app-nav shell-panel navbar-container">
      <a class="app-brand" href="../index.html">🏠 Rental Platform</a>
      <nav class="app-links">
        <a href="../pages/profile.html">Profile</a>
      </nav>
    </div>
  </div>

  <main class="page-shell">
    <section class="page-card profile-page-card">
      <div class="profile-page-head">
        <h1 class="section-title">Your Profile</h1>
        <div class="actions-row profile-actions">
          <button id="editProfileBtn" class="btn btn-primary" type="button">Edit Profile</button>
          <button id="logoutBtn" class="btn btn-danger" type="button">Logout</button>
        </div>
      </div>

      <form id="profileForm" class="form-grid">
        <div><label for="profileName">Name</label><input id="profileName" type="text" required readonly /></div>
        <div><label for="profileEmail">Email</label><input id="profileEmail" type="email" readonly /></div>
        <div><label for="profileRole">Role</label><input id="profileRole" type="text" readonly /></div>
        <div><label for="profilePhone">Phone</label><input id="profilePhone" type="text" required readonly /></div>
        <div><label for="profileCity">City</label><input id="profileCity" type="text" required readonly /></div>
        <div class="full actions-row">
          <button id="saveProfileBtn" class="btn btn-primary" type="submit" hidden>Save Changes</button>
          <button id="cancelProfileBtn" class="btn btn-secondary" type="button" hidden>Cancel</button>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="../js/authGuard.js"></script>
  <script type="module" src="../js/profile.js"></script>
</body>
</html>
