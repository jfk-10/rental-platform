<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Dashboard | NestFinder</title>
  <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body class="app-body">
  <main class="page-shell content-stack" style="max-width:760px">
    <section id="unifiedProfileSection" class="page-card" hidden>
      <h2 class="section-title">Complete your profile</h2>
      <p class="section-subtitle">One-time setup for both Owner and Tenant modes.</p>
      <form id="unifiedProfileForm" class="form-grid" style="margin-top:1rem">
        <div>
          <label for="profilePhone">Phone Number <span style="color:var(--danger)">*</span></label>
          <input type="tel" id="profilePhone" placeholder="+91 00000 00000" required />
        </div>
        <div>
          <label for="profileCity">City <span style="color:var(--danger)">*</span></label>
          <input type="text" id="profileCity" placeholder="e.g. Bangalore" required />
        </div>
        <div class="full actions-row" style="margin-top:0">
          <button id="saveUnifiedProfileBtn" class="btn btn-primary" type="submit">Save &amp; Continue</button>
        </div>
      </form>
    </section>

    <section class="page-card">
      <h2 class="section-title">Choose your dashboard</h2>
      <p class="section-subtitle">Use the same account for both Owner and Tenant workflows.</p>

      <div class="actions-row" style="margin-top:1.2rem; gap:.75rem; flex-wrap:wrap;">
        <button id="openOwnerDashboardBtn" class="btn btn-primary" type="button">Owner Dashboard</button>
        <button id="openTenantDashboardBtn" class="btn btn-secondary" type="button">Tenant Dashboard</button>
      </div>

      <p id="selectDashboardHint" class="helper-text" style="margin-top:1rem"></p>
    </section>
  </main>

  <script type="module" src="../js/authGuard.js"></script>
  <script type="module" src="../js/modules/selectDashboard.js"></script>
</body>
</html>
