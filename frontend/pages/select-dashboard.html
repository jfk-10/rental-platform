<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Dashboard | NestFinder</title>
  <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <style>
    .select-dash-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
      background: var(--bg);
    }
    .select-dash-inner {
      width: 100%;
      max-width: 680px;
      display: grid;
      gap: var(--section-gap);
    }
    .dash-option-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1.25rem;
    }
    .dash-option-card {
      border: 2px solid var(--line);
      border-radius: var(--radius-md);
      padding: 1.5rem 1.25rem;
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.18s, box-shadow 0.18s, transform 0.18s;
      text-align: center;
      display: grid;
      gap: 0.6rem;
      box-shadow: var(--shadow);
    }
    .dash-option-card:hover {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-ring), var(--shadow-md);
      transform: translateY(-2px);
    }
    .dash-option-icon {
      font-size: 2rem;
      display: block;
      margin: 0 auto 0.25rem;
    }
    .dash-option-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin: 0;
    }
    .dash-option-desc {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.55;
      margin: 0;
    }
    @media (max-width: 480px) {
      .dash-option-grid { grid-template-columns: 1fr; }
    }
  </style>
  <style id="mobile-responsive">
    /* ── Universal mobile responsiveness ── */

    /* Tables: always scrollable, never squished */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      background:
        linear-gradient(to right, var(--surface) 30%, transparent),
        linear-gradient(to left,  var(--surface) 30%, transparent) 100% 0,
        radial-gradient(farthest-side at 0 50%, rgba(15,23,42,0.07), transparent),
        radial-gradient(farthest-side at 100% 50%, rgba(15,23,42,0.07), transparent) 100% 0;
      background-repeat: no-repeat;
      background-size: 40px 100%, 40px 100%, 12px 100%, 12px 100%;
      background-attachment: local, local, scroll, scroll;
    }
    .table-wrap table { min-width: 600px; }

    @media (max-width: 600px) {
      .page-shell  { margin-top: 0.75rem; margin-bottom: 1.5rem; }
      .page-card   { padding: 1rem; }
      .form-grid   { grid-template-columns: 1fr !important; }
      .form-grid .full { grid-column: 1; }
      .kpi-grid    { grid-template-columns: repeat(2, 1fr) !important; }
      .dash-main   { padding: 0.85rem !important; }
      .dash-section-head { padding: 0.85rem 1rem !important; }
      .properties-grid,
      .property-grid { grid-template-columns: 1fr !important; }
      .profile-form-grid { grid-template-columns: 1fr !important; }
      .dash-option-grid  { grid-template-columns: 1fr !important; }
      .actions-row { flex-direction: column; }
      .actions-row .btn { width: 100%; justify-content: center; }
      .table-wrap th,
      .table-wrap td { padding: 0.55rem 0.75rem; font-size: 0.82rem; }
      .preview-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      .preview-item img { width: 100%; height: 80px; }
    }
  </style>
</head>
<body class="app-body">

  <div class="select-dash-wrap">
    <div class="select-dash-inner">

      <!-- Brand mark -->
      <div style="text-align:center">
        <a href="../index.html" style="font-size:1.2rem;font-weight:800;color:var(--text);letter-spacing:-0.04em;text-decoration:none">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:0.35rem;margin-bottom:2px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          NestFinder
        </a>
      </div>

      <!-- Profile completion section (shown if needed) -->
      <section id="unifiedProfileSection" class="page-card" hidden>
        <div style="margin-bottom:1.1rem">
          <span style="display:inline-flex;align-items:center;gap:0.4rem;background:#fef9c3;border:1px solid #fde047;border-radius:var(--radius-full);padding:0.25rem 0.75rem;font-size:0.72rem;font-weight:700;color:#854d0e;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.75rem">⚠️ One-time setup</span>
          <h2 class="section-title" style="margin-bottom:0.2rem">Complete your profile</h2>
          <p class="section-subtitle" style="margin-bottom:0">Quick setup for both Owner and Tenant modes. Just two fields.</p>
        </div>
        <form id="unifiedProfileForm" class="form-grid" style="margin-top:1rem">
          <div>
            <label for="profilePhone">Phone Number <span style="color:var(--danger)">*</span></label>
            <input type="tel" id="profilePhone" placeholder="+91 00000 00000" required />
          </div>
          <div>
            <label for="profileCity">City <span style="color:var(--danger)">*</span></label>
            <input type="text" id="profileCity" placeholder="e.g. Bangalore" required />
          </div>
          <div class="full actions-row" style="margin-top:0">
            <button id="saveUnifiedProfileBtn" class="btn btn-primary" type="submit">Save &amp; Continue →</button>
          </div>
        </form>
      </section>

      <!-- Dashboard selection -->
      <section class="page-card">
        <div style="text-align:center;margin-bottom:0.25rem">
          <h2 class="section-title" style="margin-bottom:0.35rem">Choose your dashboard</h2>
          <p class="section-subtitle" style="margin-bottom:0;max-width:44ch;margin-inline:auto">Your account works for both Owner and Tenant flows — switch anytime.</p>
        </div>

        <div class="dash-option-grid">
          <button id="openOwnerDashboardBtn" class="dash-option-card" type="button">
            <span class="dash-option-icon">🏠</span>
            <p class="dash-option-title">Owner Dashboard</p>
            <p class="dash-option-desc">List properties, manage agreements, track rent and maintenance.</p>
          </button>
          <button id="openTenantDashboardBtn" class="dash-option-card" type="button">
            <span class="dash-option-icon">🔎</span>
            <p class="dash-option-title">Tenant Dashboard</p>
            <p class="dash-option-desc">Browse rentals, pay rent, raise maintenance requests.</p>
          </button>
        </div>

        <p id="selectDashboardHint" class="helper-text" style="margin-top:1rem;text-align:center"></p>
      </section>

    </div>
  </div>

  <script type="module" src="../js/authGuard.js"></script>
  <script type="module" src="../js/modules/selectDashboard.js"></script>
</body>
</html>
