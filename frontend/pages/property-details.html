<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Details | NestFinder</title>
  <meta name="description" content="View property details including photos, rent, specs, and owner contact." />
  <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
</head>
<body class="app-body">

  <!-- Simple public-friendly nav (no dashboard redirect) -->
  <header class="utility-bar">
    <nav class="landing-nav shell-panel">
      <a class="brand-mark" href="../index.html">🏠 NestFinder</a>
      <div class="landing-links">
        <a href="../index.html">Home</a>
        <a href="../pages/discover.html">Discover</a>
      </div>
      <div class="actions-row nav-actions" id="detailsNavActions">
        <!-- Filled by JS below based on auth state -->
        <a class="btn btn-secondary" href="../pages/login.html">Login</a>
        <a class="btn btn-primary"   href="../pages/register.html">Sign up</a>
      </div>
    </nav>
  </header>

  <main class="page-shell content-stack">
    <section id="propertyDetails" class="page-card">
      <p class="section-subtitle">Loading property…</p>
    </section>
  </main>

<script type="module" src="../js/core/toast.js"></script>
<script type="module" src="../js/modules/propertyDetails.js"></script>
<script type="module">
  // Show user name in nav if already logged in (no redirect)
  import { getStoredUser } from "../js/core/auth.js";
  const user = getStoredUser();
  if (user) {
    const nav = document.getElementById("detailsNavActions");
    if (nav) {
      nav.innerHTML = `
        <span class="nav-user-chip">${user.name || user.email || "User"}</span>
        <a class="btn btn-secondary" href="../pages/property-list.html">My Dashboard</a>
      `;
    }
  }
</script>
</body>
</html>
