<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Property | Rental Platform</title>
  <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="/assets/icons/site.webmanifest">
  <link rel="preload" href="/assets/css/style.css" as="style">
  <link rel="preload" href="/assets/js/main.js" as="script">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="app-body">
  <div class="utility-bar" id="dashboardNavbar"></div>

<main class="page-shell content-stack">
  <section class="page-card">
    <h1 class="section-title">Add New Property</h1>
    <p class="section-subtitle">Publish your property listing for tenants to discover.</p>
  </section>

  <section class="page-card">
    <form id="propertyForm" class="content-stack">
      <div class="form-section card">
        <h3 class="section-title">Basic Information</h3>
        <div class="form-grid">
          <div><label for="title">Title</label><input type="text" id="title" required /></div>
          <div>
            <label for="propertyType">Type</label>
            <select id="propertyType" required>
              <option value="">Select property type</option>
              <option value="Apartment">Apartment</option>
              <option value="House">House</option>
              <option value="Studio">Studio</option>
              <option value="Office">Office</option>
              <option value="Shop">Shop</option>
              <option value="Commercial">Commercial</option>
            </select>
          </div>
          <div><label for="city">City</label><input type="text" id="city" required /></div>
          <div class="full"><label for="address">Address</label><input type="text" id="address" required /></div>
        </div>
      </div>

      <div class="form-section card">
        <h3 class="section-title">Property Details</h3>
        <div class="form-grid">
          <div id="fieldAreaSqft"><label for="areaSqft">Area (sqft)</label><input type="number" id="areaSqft" min="0" /></div>
          <div id="fieldBedrooms"><label for="bedrooms">Bedrooms</label><input type="number" id="bedrooms" min="0" /></div>
          <div id="fieldBathrooms"><label for="bathrooms">Bathrooms</label><input type="number" id="bathrooms" min="0" /></div>
          <div id="fieldOfficeRooms"><label for="officeRooms">Office Rooms</label><input type="number" id="officeRooms" min="0" /></div>
          <div id="fieldShopUnits"><label for="shopUnits">Shop Units</label><input type="number" id="shopUnits" min="0" /></div>
          <div><label for="allowedUsage">Usage</label><input type="text" id="allowedUsage" readonly disabled /></div>
        </div>
      </div>

      <div class="form-section card">
        <h3 class="section-title">Financial Details</h3>
        <div class="form-grid">
          <div><label for="rent">Rent</label><input type="text" inputmode="numeric" id="rent" required /></div>
          <div><label for="status">Status</label><select id="status"><option value="Available">Available</option><option value="Rented">Rented</option><option value="Inactive">Inactive</option></select></div>
        </div>
      </div>

      <div class="form-section card">
        <h3 class="section-title">Images</h3>
        <div class="form-grid">
          <div class="full">
            <label for="propertyImages">Upload photos</label>
            <input type="file" id="propertyImages" accept="image/*" multiple />
            <div id="galleryPreview" class="gallery-preview"></div>
          </div>
        </div>
      </div>

      <div class="full actions-row">
        <a class="btn btn-secondary" href="../dashboards/owner.html">Cancel</a>
        <button class="btn btn-primary" type="submit">Publish Property</button>
      </div>
    </form>
  </section>
</main>

  <div id="appFooter"></div>
<script type="module" src="../js/core/toast.js"></script>
<script type="module" src="../js/modules/addProperty.js"></script>
  <script type="module" src="../components/navbar.js"></script>
  <script src="/assets/js/main.js" defer></script>
</body>
</html>
