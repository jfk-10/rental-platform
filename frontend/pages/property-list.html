<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property List | Rental Platform</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png" />
  <link rel="manifest" href="/assets/icons/site.webmanifest" />
  <link rel="shortcut icon" href="/assets/icons/favicon.ico" />
</head>
<body class="app-body">
  <div class="utility-bar">
    <a class="btn btn-secondary" data-back-dashboard href="../dashboards/owner.html">← Back to Dashboard</a>
</div>

  <main class="page-shell content-stack">
    <section class="page-card content-stack">
      <div class="panel-header">
        <h2 class="section-title">Property Search Workspace</h2>
        <p class="section-subtitle">Filter by city and status to quickly manage your own listings.</p>
      </div>

      <div class="toolbar toolbar-labeled">
        <div>
          <label for="cityFilter">City</label>
          <input id="cityFilter" type="text" />
        </div>
        <div>
          <label for="statusFilter">Status</label>
          <select id="statusFilter"><option value="">All status</option><option value="Available">Available</option><option value="Rented">Rented</option><option value="Inactive">Inactive</option></select>
        </div>
        <div class="toolbar-action-wrap">
          <button id="searchBtn" class="btn btn-primary" type="button">Search</button>
        </div>
      </div>

      <div id="propertyCards" class="properties-grid"></div>
    </section>
  </main>
  <script type="module" src="../js/core/toast.js"></script>
<script type="module" src="../js/modules/propertyList.js"></script>
<script type="module" src="../js/modules/appShell.js"></script>
</body>
</html>
