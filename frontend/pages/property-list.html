<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Properties | NestFinder</title>
  <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
</head>
<body class="app-body">
  <div class="utility-bar" id="dashboardNavbar"></div>

  <main class="page-shell content-stack">
    <section class="page-card content-stack">
      <div class="panel-header">
        <h2 class="section-title">Admin Property Workspace</h2>
        <p class="section-subtitle">Review and filter all platform listings from one administrative view.</p>
      </div>

      <div class="toolbar toolbar-labeled">
        <div>
          <label for="searchInput">Search</label>
          <input id="searchInput" type="text" placeholder="Title, city, or type" />
        </div>
        <div>
          <label for="cityFilter">City</label>
          <input id="cityFilter" type="text" />
        </div>
        <div>
          <label for="statusFilter">Status</label>
          <select id="statusFilter"><option value="">All status</option><option value="Available">Available</option><option value="Rented">Rented</option><option value="Inactive">Inactive</option></select>
        </div>
        <div>
          <label for="budgetFilter">Budget (Max ₹)</label>
          <input id="budgetFilter" type="text" inputmode="numeric" placeholder="e.g. 20000" />
        </div>
        <div class="toolbar-action-wrap">
          <button id="searchBtn" class="btn btn-primary" type="button">Search</button>
        </div>
      </div>

      <div id="propertyCards" class="properties-grid"></div>
    </section>
  </main>

  <script type="module" src="../js/authGuard.js"></script>
  <script type="module" src="../js/modules/propertyList.js"></script>
  <script type="module" src="../components/navbar.js"></script>
</body>
</html>
