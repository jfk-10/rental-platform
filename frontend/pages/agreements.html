<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agreements | NestFinder</title>
  <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
</head>
<body class="app-body">
  <div class="utility-bar" id="dashboardNavbar"></div>

  <main class="page-shell content-stack">
    <section class="page-card">
      <h2 class="section-title">Rental Agreements</h2>
    </section>

    <form id="agreementForm" class="page-card">
      <h3 class="section-title">Create Agreement</h3>
      <div class="form-grid">
      <div>
        <label for="propertyId">Property</label>
        <select id="propertyId" required></select>
      </div>
      <div>
        <label for="tenantId">Tenant</label>
        <select id="tenantId" required></select>
      </div>
      <div>
        <label for="startDate">Start Date</label>
        <input id="startDate" type="date" required />
      </div>
      <div>
        <label for="endDate">End Date</label>
        <input id="endDate" type="date" required />
      </div>
      <div>
        <label for="monthlyRent">Monthly Rent</label>
        <input id="monthlyRent" type="text" inputmode="numeric" readonly />
        <p class="helper-text">This is pulled from the selected property listing.</p>
      </div>
      <div>
        <div class="checkbox-inline"><input id="policeVerified" type="checkbox" /><label for="policeVerified">Police Verified</label></div>
      </div>
      <div>
        <label for="agreementStatus">Status</label>
        <input id="agreementStatus" type="text" value="Pending Owner Approval" readonly />
        <p class="helper-text">Admin creates the request, owner sets the deposit during approval, and the agreement becomes active only after owner and tenant approve.</p>
      </div>
      <div class="full">
        <button class="btn btn-primary" type="submit">Create Agreement</button>
      </div>
    </div>
    </form>

    <section class="page-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Property</th>
              <th>Tenant</th>
              <th>Duration</th>
              <th>Rent</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="agreementTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="../js/authGuard.js"></script>
  <script type="module" src="../js/modules/agreements.js"></script>
  <script type="module" src="../components/navbar.js"></script>
</body>
</html>
